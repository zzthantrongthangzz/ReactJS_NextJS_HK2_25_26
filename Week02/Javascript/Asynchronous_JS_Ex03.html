<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .images { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
        img { max-width: 400px; }
        .parallel { max-width: 250px; border: 5px solid green; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Asynchronous_JS_Ex03</h2>

    <button id="btnPart1">Run 1 (loadNPause)</button>
    <button id="btnPart2">Run 2 (loadAll)</button>

    <div class="images"></div>

    <script>
        const imgContainer = document.querySelector('.images');

        const wait = function(seconds) {
            return new Promise(function(resolve) {
                setTimeout(resolve, seconds * 1000);
            });
        };

        const createImage = function(imgPath) {
            return new Promise(function(resolve, reject) {
                const img = document.createElement('img');
                img.src = imgPath;

                img.addEventListener('load', function() {
                    imgContainer.append(img);
                    resolve(img);
                });

                img.addEventListener('error', function() {
                    reject(new Error('Image not found or failed to load!'));
                });
            });
        };

        const loadNPause = async function() {
            try {
                imgContainer.innerHTML = '';
                console.log('PART 1');

                let img = await createImage('https://picsum.photos/id/237/400/300');
                console.log('Image 1 loaded');
                await wait(2);
                img.style.display = 'none'; 

                // Tải ảnh
                img = await createImage('https://picsum.photos/id/238/400/300');
                console.log('Image 2 loaded');
                await wait(2);
                img.style.display = 'none';
                
                console.log('Part 1 Complete!');

            } catch (err) {
                console.error('Error:', err);
            }
        };

        // ---------
        const loadAll = async function(imgArr) {
            try {
                imgContainer.innerHTML = '';
                console.log('PART 2');

                const imgs = imgArr.map(async imgPath => await createImage(imgPath));
                
                console.log('Array of Promises:', imgs);

                const imgsEl = await Promise.all(imgs);
                console.log('Array of Loaded Image Elements:', imgsEl);

                imgsEl.forEach(img => img.classList.add('parallel'));

            } catch (err) {
                console.error('Error:', err);
            }
        };

        document.getElementById('btnPart1').addEventListener('click', loadNPause);       
        document.getElementById('btnPart2').addEventListener('click', function() {
            const imgArray = [
                'https://picsum.photos/id/239/400/300',
                'https://picsum.photos/id/240/400/300',
                'https://picsum.photos/id/241/400/300'
            ];
            loadAll(imgArray);
        });
    </script>
</body>
</html>
