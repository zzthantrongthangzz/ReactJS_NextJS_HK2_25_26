<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>DataStructures_ModernOperators_Strings_JS_Ex01</h2>
    <button id="btnRun">Run Challenge</button>

    <script>
        // Dữ liệu
        const game = {
            team1: 'Bayern Munich',
            team2: 'Borrussia Dortmund',
            players: [
                [
                    'Neuer', 'Pavard', 'Martinez', 'Alaba', 'Davies', 'Kimmich', 
                    'Goretzka', 'Coman', 'Muller', 'Gnarby', 'Lewandowski'
                ],
                [
                    'Burki', 'Schulz', 'Hummels', 'Akanji', 'Hakimi', 'Weigl', 
                    'Witsel', 'Hazard', 'Brandt', 'Sancho', 'Gotze'
                ],
            ],
            score: '4:0',
            scored: ['Lewandowski', 'Gnarby', 'Lewandowski', 'Hummels'],
            date: 'Nov 9th, 2037',
            odds: {
                team1: 1.33,
                x: 3.25,
                team2: 6.5,
            },
        };

        document.getElementById("btnRun").addEventListener("click", function() {
            // 1
            const [players1, players2] = game.players;
            console.log("1. Cầu thủ Đội 1:", players1);
            console.log("1. Cầu thủ Đội 2:", players2);

            // 2
            const [gk, ...fieldPlayers] = players1;
            console.log("2. Thủ môn Đội 1:", gk);
            console.log("2. Cầu thủ sân Đội 1:", fieldPlayers);

            // 3
            const allPlayers = [...players1, ...players2];
            console.log("3. Tất cả 22 cầu thủ:", allPlayers);

            //4 SPREAD Operator
            const players1Final = [...players1, 'Thiago', 'Coutinho', 'Perisic'];
            console.log("4. Đội 1 sau thay người:", players1Final);

            //5
            const { odds: { team1, x: draw, team2 } } = game;
            console.log(`5. Tỉ lệ cược: Team1=${team1}, Draw=${draw}, Team2=${team2}`);

            // 6
            const printGoals = function(...players) {
                console.log(`6. Các cầu thủ ghi bàn: ${players}`);
                console.log(`-> Tổng cộng có ${players.length} bàn thắng được ghi`);
            };

            // Test data 6
            printGoals('Davies', 'Muller', 'Lewandowski', 'Kimmich');
            printGoals(...game.scored);

            // 7
            console.log("7. Đội có khả năng thắng cao hơn là:");
            team1 < team2 && console.log('Team 1 (Bayern Munich)');
            team2 < team1 && console.log('Team 2 (Borrussia Dortmund)');
        });
    </script>
</body>
</html>
