<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>DataStructures_ModernOperators_Strings_JS_Ex03</h2>

    <button id="btnRun">Run</button>

    <script>
        const gameEvents = new Map([            
            [17, 'GOAL'],
            [36, 'Substitution'],
            [47, 'GOAL'],
            [61, 'Substitution'],
            [64, 'Yellow card'],
            [69, 'Red card'],
            [70, 'Substitution'],
            [72, 'Substitution'],
            [76, 'GOAL'],
            [80, 'GOAL'],
            [92, 'Yellow card'],
        ]);

        document.getElementById("btnRun").addEventListener("click", function() {
            // 1
            const events = [...new Set(gameEvents.values())];
            console.log("1. Mảng các sự kiện (không trùng lặp):");
            console.log(events);

            //2
            gameEvents.delete(64);  //Xóa sự kiện thẻ vàng phút 64
            console.log("\n2. Đã xóa sự kiện phút 64. Kiểm tra Map hiện tại:");
            console.log(gameEvents);

            // 3
            const time = 90;
            const average = time / gameEvents.size; 
            console.log(`\n3. An event happened, on average, every ${average} minutes`);

            // 4
            console.log("\n4. Lịch sử sự kiện:");
            for (const [min, event] of gameEvents) {
                const half = min <= 45 ? 'FIRST' : 'SECOND';
                console.log(`[${half} HALF] ${min}: ${event}`);
            }
        });
    </script>
</body>
</html>
