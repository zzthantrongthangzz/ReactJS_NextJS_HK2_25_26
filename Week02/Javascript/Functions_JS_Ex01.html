<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Functions_JS_Ex01: Poll App</h2>

    <button id="btnAnswer">Answer poll</button>
    <button id="btnBonus">Run Bonus Data</button>

    <script>
        const poll = {
            question: "What is your favourite programming language?",
            options: ["0: JavaScript", "1: Python", "2: Rust", "3: C++"],
            answers: new Array(4).fill(0),

            // 1 method registerNewAnswer
            registerNewAnswer() {
                const answer = Number(
                    prompt(
                        `${this.question}\n${this.options.join('\n')}\n(Write option number)`
                    )
                );

                if (
                    typeof answer === 'number' &&
                    answer >= 0 &&
                    answer < this.answers.length
                ) {
                    this.answers[answer]++; 
                } else {
                    alert("Input invalid! (Vui lòng nhập số từ 0 đến 3)");
                }

                //  4 Gọi displayResults khi nhập xong
                this.displayResults(); 
                this.displayResults('string'); 
            },

            // 3 method displayResults với tham số mặc định 'array'
            displayResults(type = 'array') {
                if (type === 'array') {
                    console.log(this.answers);
                } else if (type === 'string') {
                    console.log(`Poll results are ${this.answers.join(', ')}`);
                }
            }
        };

        // 2 sự kiện click
        document
            .getElementById("btnAnswer")
            .addEventListener("click", poll.registerNewAnswer.bind(poll));

        // 5 Mượn hàm bằng pt .call()
        document.getElementById("btnBonus").addEventListener("click", function() {
            console.log("Két quả");
            
            poll.displayResults.call({ answers: [5, 2, 3] }, 'array');

            poll.displayResults.call({ answers: [1, 5, 3, 9, 6, 1] }, 'string');
        });
    </script>
</body>
</html>
