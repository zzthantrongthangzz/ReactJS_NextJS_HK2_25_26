<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>WorkingWithArrays_JS_Ex03</h2>
    <button id="btnRun">Runnn</button>

    <script>
        const calcAverageHumanAge = ages => 
            ages
                .map(age => age <= 2 ? 2 * age : 16 + age * 4)
                .filter(age => age >= 18)
                .reduce((acc, age, i, arr) => acc + age / arr.length, 0);

        document.getElementById("btnRun").addEventListener("click", function() {
            const data1 = [5, 2, 4, 1, 15, 8, 3];
            const data2 = [16, 6, 10, 5, 6, 1, 4];

            console.log("-----");
            const avg1 = calcAverageHumanAge(data1);
            console.log(`Tuổi trung bình (Data 1): ${avg1}`);

            const avg2 = calcAverageHumanAge(data2);
            console.log(`Tuổi trung bình (Data 2): ${avg2}`);
        });
    </script>
</body>
</html>
